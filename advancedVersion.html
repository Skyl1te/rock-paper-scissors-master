<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32x32.png">
<link rel="stylesheet" href="../css/main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
<title>Rock Paper Scissors - Advanced</title>
</head>
<body>

<div id="header"></div>

<main class="main" id="advancedGameScreen">
  <div class="advancedGame">
    <button class="moveBtn moveBtn__advanced--rock moveBtn--rock" value="rock">
      <img src="../assets/icons/icon-rock.svg" alt="Rock">
    </button>
    <button class="moveBtn moveBtn__advanced--paper moveBtn--paper" value="paper">
      <img src="../assets/icons/icon-paper.svg" alt="Paper">
    </button>
    <button class="moveBtn moveBtn__advanced--scissors moveBtn--scissors" value="scissors">
      <img src="../assets/icons/icon-scissors.svg" alt="Scissors">
    </button>
    <button class="moveBtn moveBtn__advanced--lizard moveBtn--lizard" value="lizard">
      <img src="../assets/icons/icon-lizard.svg" alt="Lizard">
    </button>
    <button class="moveBtn moveBtn__advanced--spock moveBtn--spock" value="spock">
      <img src="../assets/icons/icon-spock.svg" alt="Spock">
    </button>
  </div>
</main>

<main class="result" id="resultScreen" style="display: none;">
  <div class="result__container">
    <div class="result__pick">
      <p class="result__title">YOU PICKED</p>
      <div id="userPick"></div>
    </div>
    
    <div class="result__center">
      <h2 id="resultText"></h2>
      <button id="playAgain">PLAY AGAIN</button>
    </div>
    
    <div class="result__pick">
      <p class="result__title">THE HOUSE PICKED</p>
      <div id="computerPick"></div>
    </div>
  </div>
</main>

<div class="linkBtns">
<div class="linkBtn">
    <button>
      <a href="advancedRules.html">Rules</a>
    </button>
</div>
<div class="linkBtn">
  <button><a href="./index.html">Classic Mode</a></button>
</div>

    <div class="linkBtn">
      <button>
        <a href="advancedVersion.html">Play</a>
      </button>
    </div>
</div>

<div id="footer"></div>
<script src="../js/advanced.js"></script>

</body>
</html>
